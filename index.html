<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHI-MEI FLORAL 作品搜尋</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #faf9f7; color: #333; }

  header {
    background: #fff;
    border-bottom: 1px solid #e8e0d8;
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 1px; color: #8b6f5e; margin-bottom: 10px; }

  .search-bar {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .search-bar input {
    flex: 1; padding: 8px 12px; border: 1px solid #ddd;
    border-radius: 20px; font-size: 14px; outline: none;
    background: #f9f9f9;
  }
  .search-bar input:focus { border-color: #c4a08e; background: #fff; }
  .search-bar button {
    padding: 8px 16px; border: none; border-radius: 20px;
    background: #c4a08e; color: #fff; font-size: 13px; cursor: pointer;
  }

  .filters { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 4px 12px; border: 1px solid #d4c4ba; border-radius: 14px;
    font-size: 12px; cursor: pointer; background: #fff; color: #7a6358;
    transition: all 0.15s; white-space: nowrap;
  }
  .chip.active { background: #c4a08e; border-color: #c4a08e; color: #fff; }
  .chip:hover { background: #f0e8e2; }

  .stats {
    padding: 8px 20px; font-size: 12px; color: #999;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px; padding: 2px;
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    position: relative; background: #eee; overflow: hidden;
    aspect-ratio: 1; cursor: pointer;
  }
  .card img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: transform 0.2s;
  }
  .card:hover img { transform: scale(1.05); }
  .card .info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: #fff; padding: 20px 6px 6px;
    font-size: 11px; line-height: 1.4;
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .info { opacity: 1; }
  .card .info .bf { font-size: 10px; opacity: 0.8; }
  .card .info .flowers { font-weight: 500; }

  /* 手機版：常駐顯示花材 */
  @media (max-width: 600px) {
    .card .info { opacity: 1; background: linear-gradient(transparent, rgba(0,0,0,0.5)); }
  }

  /* lightbox */
  #lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88);
        z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  #lb.open { display:flex; }
  #lb img { max-width:92vw; max-height:82vh; object-fit:contain; border-radius:4px; }
  #lb .lb-info { color:#fff; font-size:13px; text-align:center; }
  #lb .lb-close { position:absolute; top:16px; right:20px; color:#fff; font-size:28px; cursor:pointer; }

  .empty { text-align:center; padding:60px 20px; color:#aaa; font-size:14px; }
</style>
</head>
<body>

<header>
  <h1>CHI-MEI FLORAL 作品搜尋</h1>
  <div class="search-bar">
    <input id="q" type="search" placeholder="搜尋花材、色系、BF 編號…" oninput="render()">
    <button onclick="clearAll()">清除</button>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<div id="lb" onclick="closeLb(event)">
  <span class="lb-close" onclick="closeLb()">×</span>
  <img id="lb-img" src="">
  <div class="lb-info" id="lb-info"></div>
</div>

<script>
let ALL = [];
let activeFilter = '';

async function init() {
  const res = await fetch('data.json');
  const tags = await res.json();
  ALL = Object.entries(tags)
    .filter(([, v]) => v.url)
    .map(([bf_no, v]) => ({
      bf_no,
      url: v.url,
      colors: v.colors || '',
      flowers: v.flowers || '',
      note: v.note || ''
    }));
  buildFilters();
  render();
}

function buildFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';

  // 固定色系 chips
  const baseColors = ['粉','白','紅','紫','藍','橘','黃','綠','黑','灰','奶茶','繽紛'];
  baseColors.forEach(c => {
    const el = document.createElement('span');
    el.className = 'chip';
    el.textContent = c;
    el.dataset.filter = c;
    el.onclick = () => toggleFilter(c, el);
    container.appendChild(el);
  });

}

function toggleFilter(val, el) {
  if (activeFilter === val) {
    activeFilter = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  } else {
    activeFilter = val;
    document.querySelectorAll('.chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === val);
    });
  }
  render();
}

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  let list = ALL;

  if (q) {
    list = list.filter(item =>
      item.bf_no.toLowerCase().includes(q) ||
      item.flowers.toLowerCase().includes(q) ||
      item.colors.toLowerCase().includes(q)
    );
  }
  if (activeFilter) {
    list = list.filter(item =>
      item.colors.includes(activeFilter) || item.flowers.includes(activeFilter)
    );
  }

  document.getElementById('stats').textContent = `顯示 ${list.length} / ${ALL.length} 件作品`;

  const grid = document.getElementById('grid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">找不到符合的作品</div>';
    return;
  }

  grid.innerHTML = list.map(item => {
    const thumb = item.url.replace('/upload/', '/upload/w_400,c_fill,q_auto/');
    return `<div class="card" onclick="openLb('${item.url}','${item.bf_no}','${item.flowers}','${item.colors}')">
      <img src="${thumb}" loading="lazy" alt="${item.bf_no}">
      <div class="info">
        <div class="flowers">${item.flowers || '—'}</div>
        <div class="bf">${item.bf_no} · ${item.colors}</div>
      </div>
    </div>`;
  }).join('');
}

function clearAll() {
  document.getElementById('q').value = '';
  activeFilter = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  render();
}

function openLb(url, bf, flowers, colors) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lb-info').textContent = `${bf}　${flowers}　${colors}`;
  document.getElementById('lb').classList.add('open');
}

function closeLb(e) {
  if (!e || e.target === document.getElementById('lb') || e.target.classList.contains('lb-close')) {
    document.getElementById('lb').classList.remove('open');
    document.getElementById('lb-img').src = '';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb({target: document.getElementById('lb')}); });

init();
</script>
</body>
</html>
